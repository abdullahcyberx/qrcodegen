<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <!-- Basic SEO tags -->
    <meta name="description" content="Generate beautifully simple QR codes instantly.">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Subtle Animated Background -->
    <div class="background-fx">
        <!-- Animated Brand Background Text -->
        <div class="bg-brand-text">SHEHZADA</div>
    </div>
    <main class="container">
        <!-- Text Gradients Examples -->
        <header class="hero">
            <h1>QR Code Generator</h1>
            <p>Enter text or a URL to generate a dynamic code.</p>
        </header>



        <!-- Minimalist Professional Card -->
        <section class="pro-card">
            <form id="qr-form" style="display: flex; flex-direction: column;">
                <input type="text" id="text-input" placeholder="e.g., https://example.com" required autocomplete="off">
                <button type="submit" id="generate-btn" class="primary-btn">Generate QR Code</button>
            </form>

            <!-- Status and Results -->
            <div id="loading" class="loading" hidden>
                <div class="spinner"></div>
                <p>Generating...</p>
            </div>
            
            <div id="error-message" class="error-message" hidden></div>

            <div class="result-container" id="result-container" hidden>
                <div class="qr-wrapper">
                    <img id="qr-image" alt="Generated QR Code">
                </div>
                <div class="actions">
                    <a id="download-btn" class="primary-btn download-btn" download="qrcode.png">Download QR Code</a>
                </div>
            </div>
            
            <!-- Ad Banner (320x50) -->
            <div style="margin-top: 2rem; display: flex; justify-content: center; width: 100%; min-height: 50px;">
                <script type="text/javascript">
                    atOptions = {
                        'key' : '2a019f7d03da0b2090f7c78e9a2e0af7',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                </script>
                <script type="text/javascript" src="//www.highperformanceformat.com/2a019f7d03da0b2090f7c78e9a2e0af7/invoke.js"></script>
            </div>
        </section>


    </main>
    
    <script src="script.js"></script>
</body>
</html>
